name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build web app (Vite)
        run: pnpm run build
        working-directory: artifacts/instagram-clone

      - name: Sync Capacitor assets
        run: npx cap sync android
        working-directory: artifacts/instagram-clone

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: artifacts/instagram-clone/android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: artifacts/instagram-clone/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grova-debug-apk
          path: artifacts/instagram-clone/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
